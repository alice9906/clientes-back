name: Build and Push Docker Image

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Login a Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build imagen
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/clientes-back .

    - name: Push imagen
      run: docker push ${{ secrets.DOCKER_USERNAME }}/clientes-back